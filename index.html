<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen flex items-center justify-center p-4">

    <!-- LOGIN VIEW -->
    <div id="login-view" class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-700">Admin Login</h2>
        <input type="text" id="username" placeholder="Username" value="admin"
            class="w-full p-3 border rounded mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <input type="password" id="password" placeholder="Password"
            class="w-full p-3 border rounded mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button onclick="doLogin()" id="login-btn"
            class="w-full bg-blue-600 text-white p-3 rounded hover:bg-blue-700 font-semibold">
            Login
        </button>
        <div id="login-status" class="mt-4 text-center text-sm hidden"></div>
    </div>

    <!-- DASHBOARD VIEW -->
    <div id="dashboard-view" class="hidden w-full max-w-4xl bg-white p-6 rounded-lg shadow-md">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-700">🛒 Product Management</h2>
            <button onclick="doLogout()" class="text-red-500 hover:underline font-medium">Logout</button>
        </div>

        <!-- Add Product -->
        <div class="bg-gray-50 p-4 rounded-lg mb-6 border">
            <h3 class="font-semibold mb-3">Add New Product</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
                <input type="text" id="p-name" placeholder="Product Name" class="p-2 border rounded">
                <input type="number" id="p-price" placeholder="Price (Rp)" class="p-2 border rounded">
                <input type="number" id="p-stock" placeholder="Stock" class="p-2 border rounded">
            </div>
            <button onclick="doAddProduct()" class="w-full bg-green-600 text-white p-2 rounded hover:bg-green-700 font-medium">
                ➕ Add Product
            </button>
        </div>

        <!-- Product Table -->
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-200">
                        <th class="p-3 border">ID</th>
                        <th class="p-3 border">Name</th>
                        <th class="p-3 border">Price</th>
                        <th class="p-3 border">Stock</th>
                    </tr>
                </thead>
                <tbody id="product-list">
                    <tr><td colspan="4" class="p-3 border text-center text-gray-400">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // ============================================================
        // ⚠️ GANTI URL INI DENGAN URL WORKER ANDA YANG SEBENARNYA!
        // Contoh: 'https://telegram-store-bot.username.workers.dev'
        // ============================================================
        const API = 'https://bot-store2.youthankare.workers.dev';

        let token = localStorage.getItem('admin_token');

        // Auto-login jika token masih ada
        if (token) {
            showDashboard();
            loadProducts();
        }

        function showStatus(msg, isError) {
            const el = document.getElementById('login-status');
            el.textContent = msg;
            el.className = 'mt-4 text-center text-sm ' + (isError ? 'text-red-500' : 'text-green-500');
            el.classList.remove('hidden');
        }

        function showDashboard() {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.remove('hidden');
        }

        // ==================== LOGIN ====================
        async function doLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');

            if (!password) {
                showStatus('Password tidak boleh kosong!', true);
                return;
            }

            btn.textContent = 'Logging in...';
            btn.classList.add('loading');
            showStatus('Menghubungi server...', false);

            try {
                const res = await fetch(API + '/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json().catch(() => ({}));

                if (res.ok && data.token) {
                    token = data.token;
                    localStorage.setItem('admin_token', token);
                    showStatus('Login berhasil! ✅', false);
                    setTimeout(() => {
                        showDashboard();
                        loadProducts();
                    }, 500);
                } else {
                    showStatus('❌ ' + (data.error || 'Username/Password salah!'), true);
                }
            } catch (err) {
                showStatus('❌ Gagal terhubung ke server: ' + err.message, true);
            } finally {
                btn.textContent = 'Login';
                btn.classList.remove('loading');
            }
        }

        function doLogout() {
            localStorage.removeItem('admin_token');
            token = null;
            document.getElementById('login-view').classList.remove('hidden');
            document.getElementById('dashboard-view').classList.add('hidden');
        }

        // ==================== PRODUCTS ====================
        async function loadProducts() {
            try {
                const res = await fetch(API + '/api/admin/products', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (res.status === 401 || res.status === 403) {
                    doLogout();
                    showStatus('Token expired. Silakan login ulang.', true);
                    return;
                }

                const data = await res.json();
                const tbody = document.getElementById('product-list');

                if (!data.data || data.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="p-3 border text-center text-gray-400">Belum ada produk. Tambahkan via form di atas atau command Telegram /addproduct</td></tr>';
                    return;
                }

                tbody.innerHTML = data.data.map(p => `
                    <tr class="hover:bg-gray-50">
                        <td class="p-3 border">${p.id}</td>
                        <td class="p-3 border font-medium">${p.name}</td>
                        <td class="p-3 border">Rp ${Number(p.price).toLocaleString()}</td>
                        <td class="p-3 border ${p.stock < 10 ? 'text-red-600 font-bold' : ''}">${p.stock}</td>
                    </tr>
                `).join('');
            } catch (err) {
                document.getElementById('product-list').innerHTML = 
                    '<tr><td colspan="4" class="p-3 border text-center text-red-500">Gagal memuat: ' + err.message + '</td></tr>';
            }
        }

        async function doAddProduct() {
            const name = document.getElementById('p-name').value.trim();
            const price = parseInt(document.getElementById('p-price').value);
            const stock = parseInt(document.getElementById('p-stock').value);

            if (!name || isNaN(price) || isNaN(stock)) {
                alert('Lengkapi semua data dengan benar!');
                return;
            }

            try {
                const res = await fetch(API + '/api/admin/products', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ name, price, stock })
                });

                if (res.ok) {
                    document.getElementById('p-name').value = '';
                    document.getElementById('p-price').value = '';
                    document.getElementById('p-stock').value = '';
                    loadProducts();
                } else {
                    alert('Gagal menambah produk.');
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }
    </script>
</body>
</html>
