<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Admin Dashboard</title>
    <!-- Tailwind CSS via CDN (Zero Build Step) -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen flex items-center justify-center p-4">

    <!-- LOGIN VIEW -->
    <div id="login-view" class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-700">Admin Login</h2>
        <input type="text" id="username" placeholder="Username" class="w-full p-3 border rounded mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" value="admin">
        <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button onclick="login()" class="w-full bg-blue-600 text-white p-3 rounded hover:bg-blue-700 font-semibold">Login</button>
        <p id="login-error" class="text-red-500 text-sm mt-4 text-center hidden">Username/Password salah!</p>
    </div>

    <!-- DASHBOARD VIEW -->
    <div id="dashboard-view" class="hidden w-full max-w-4xl bg-white p-6 rounded-lg shadow-md">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-700">Product Management</h2>
            <button onclick="logout()" class="text-red-500 hover:underline">Logout</button>
        </div>

        <!-- Add Product Form -->
        <div class="bg-gray-50 p-4 rounded-lg mb-6 border">
            <h3 class="font-semibold mb-3">Add New Product</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <input type="text" id="p-name" placeholder="Product Name" class="p-2 border rounded">
                <input type="number" id="p-price" placeholder="Price" class="p-2 border rounded">
                <input type="number" id="p-stock" placeholder="Stock" class="p-2 border rounded">
            </div>
            <button onclick="addProduct()" class="mt-3 w-full bg-green-600 text-white p-2 rounded hover:bg-green-700">Add Product</button>
        </div>

        <!-- Product List -->
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-200">
                        <th class="p-3 border">ID</th>
                        <th class="p-3 border">Name</th>
                        <th class="p-3 border">Price</th>
                        <th class="p-3 border">Stock</th>
                    </tr>
                </thead>
                <tbody id="product-list">
                    <!-- Rows will be injected here by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 🔧 KONFIGURASI PENTING: Ganti URL ini dengan URL Worker Anda!
        const API_BASE_URL = 'https://bot-store2.youthankare.workers.dev'; 
        
        let token = localStorage.getItem('admin_token');

        // Init: Cek apakah sudah login
        if (token) {
            showDashboard();
            fetchProducts();
        }

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const res = await fetch(`${API_BASE_URL}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    const data = await res.json();
                    token = data.token;
                    localStorage.setItem('admin_token', token);
                    showDashboard();
                    fetchProducts();
                } else {
                    document.getElementById('login-error').classList.remove('hidden');
                }
            } catch (err) {
                alert('Gagal terhubung ke server. Cek CORS atau URL API.');
            }
        }

        function logout() {
            localStorage.removeItem('admin_token');
            token = null;
            document.getElementById('login-view').classList.remove('hidden');
            document.getElementById('dashboard-view').classList.add('hidden');
        }

        function showDashboard() {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.remove('hidden');
        }

        async function fetchProducts() {
            const res = await fetch(`${API_BASE_URL}/api/admin/products`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            
            const tbody = document.getElementById('product-list');
            tbody.innerHTML = '';
            
            data.data.forEach(p => {
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="p-3 border">${p.id}</td>
                        <td class="p-3 border font-medium">${p.name}</td>
                        <td class="p-3 border">Rp ${p.price.toLocaleString()}</td>
                        <td class="p-3 border ${p.stock < 10 ? 'text-red-600 font-bold' : ''}">${p.stock}</td>
                    </tr>
                `;
            });
        }

        async function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = parseInt(document.getElementById('p-price').value);
            const stock = parseInt(document.getElementById('p-stock').value);

            if (!name || isNaN(price) || isNaN(stock)) {
                alert('Lengkapi semua data!');
                return;
            }

            const res = await fetch(`${API_BASE_URL}/api/admin/products`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}` 
                },
                body: JSON.stringify({ name, price, stock })
            });

            if (res.ok) {
                alert('Produk berhasil ditambah!');
                document.getElementById('p-name').value = '';
                document.getElementById('p-price').value = '';
                document.getElementById('p-stock').value = '';
                fetchProducts(); // Refresh tabel
            } else {
                alert('Gagal menambah produk.');
            }
        }
    </script>
</body>
</html>
